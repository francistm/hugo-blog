  <div class="content markdown"><p>哎，由于Willerce哥发来了AppFog，这种云平台还是第一次接触，好有诱惑力啊。<br>

<p>哎，多的不说了，有兴趣的朋友可以去Github看看源码。</p>
<p>最后补充下，<a href="http://lepture.com">Lepture</a>哥的 <a href="https://github.com/lepture/liquidluck">Liquidluck</a> 真的很不错，我只是累了，不想再修改完编译，完了再上传……</p>
