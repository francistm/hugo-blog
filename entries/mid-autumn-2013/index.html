  <h1 class="page-title">又是一年中秋</h1>

  <div class="page-meta">
    发表于 2016-02-12 18:05:12，
    最后更新 2016-02-12 18:05:12
  </div>

  <div class="content markdown"><p>想想时间过的好像挺快，上一个中秋我已经完全没有印象了。</p>
<p>既然已经选择了这样的生活，那就只能继续走下去了。
生活还是这么的凄惨，日子还得一天天的熬下去。</p>
<p>发现家里人聚餐这种活动要少参与，什么七大姨八大姑的聚在一起喝点酒，什么有的没的都开始乱讲了。
本来高高兴兴的过个节，弄到最后一个个都感觉成了血海深仇，一把鼻涕一把泪的。
上了年纪的这些女人真是没救了……</p>
</div>
