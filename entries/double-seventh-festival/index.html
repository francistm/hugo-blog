  <h1 class="page-title">这也算传统节日</h1>

  <div class="page-meta">
    发表于 2016-02-12 18:02:37，
    最后更新 2016-02-12 18:02:37
  </div>

  <div class="content markdown"><p>这节日话说也算中国传统节日，就如同经常扯淡时会谈论起的“中国传统美德”一样。</p>
<p>但我只想说，就如同推上看到的一句话一样：<code>我觉得最后除了清明节，所有的民俗节日都会成为人间打炮节的</code>。
不过我等屌丝只能在电脑前写着PHP，或者和哥们去吃点烤肉，最多泡下酒吧搞两瓶力娇酒。</p>
<p>不过这样也好，不至于除了开房约炮变得最后什么都不知道。</p>
</div>
