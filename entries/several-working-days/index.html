  <h1 class="page-title">工作的这几天</h1>

  <div class="page-meta">
    <span>发布于 2016-02-12 17:59:17</span>,
    <span>最后更新 2016-02-28 17:44:22</span>
  </div>

  <div class="content markdown"><p>不知道为什么，突然找了份半正式的工作，或许真的是每天面对电脑太无聊了吧～<br>
给朋友们一说完我去从事了服务性行业而非技术型的时候，居然没有人相信，都以为我在开玩笑，哎，活的真失败啊。</p>
<p>晚上的工作还算清闲，不用去的太早，忙也就是不到一个小时的时间，不忙的时候还可以上上网，打打Xbox 360。只是回家稍微有些晚。</p>
<p>总之一切还好，虽然从事了一个与程序员毫无相关的工作，但晚上依然可以编码～</p>
